name: Generate and publish

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      count:
        description: How many new booklets to generate
        required: true
        default: '3'
        type: choice
        options: ['1', '3', '6']

      force_generate:
        description: Generate more even if today's booklets already exist
        required: true
        default: true
        type: boolean

      use_ai:
        description: Use OpenAI when OPENAI_API_KEY is configured
        required: true
        default: true
        type: boolean

      chaos_level:
        description: Design chaos (-1 auto, 0 safe, 5 wild)
        required: true
        default: '-1'
        type: choice
        options: ['-1', '0', '1', '2', '3', '4', '5']

  schedule:
    - cron: '15 07 * * *'
      timezone: 'Europe/Riga'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate booklet concepts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMAGE_PROVIDER: mixed
          BOOKLET_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.count || '3' }}
          FORCE_GENERATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_generate && 'true' || 'false' }}
          USE_AI: ${{ github.event_name == 'schedule' && 'true' || (inputs.use_ai && 'true' || 'false') }}
          CHAOS_LEVEL: ${{ github.event_name == 'workflow_dispatch' && inputs.chaos_level || '-1' }}
          BOOKLET_RUN_ID: ${{ github.run_id }}
        run: npm run generate

      - name: Commit generated concepts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet; then
            echo "No new concepts to commit."
            exit 0
          fi

          git config user.name "ai-booklet-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/booklets.json
          git commit -m "Add generated booklet concepts"
          git push

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js _site/
          touch _site/.nojekyll
          cp -R data _site/data

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
