name: Generate and publish

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      count:
        description: How many new booklets to generate
        required: true
        default: '3'
        type: choice
        options: ['1', '3', '6']

      force_generate:
        description: Generate more even if today's booklets already exist
        required: true
        default: true
        type: boolean

      use_ai:
        description: Use external AI providers
        required: true
        default: true
        type: boolean

      ai_provider:
        description: AI provider and fallback order
        required: true
        default: auto
        type: choice
        options:
          - auto
          - openai-first
          - gemini-first
          - openai-only
          - gemini-only
          - local

      chaos_level:
        description: Design chaos (-1 auto, 0 safe, 5 wild)
        required: true
        default: '-1'
        type: choice
        options: ['-1', '0', '1', '2', '3', '4', '5']



      max_fonts:
        description: Maximum Google Fonts per booklet
        required: true
        default: '20'
        type: choice
        options: ['2', '4', '8', '12', '20']

      image_provider:
        description: Photo source
        required: true
        default: mixed
        type: choice
        options: [mixed, unsplash, openverse]

      topic:
        description: Booklet topic (leave empty for automatic selection)
        required: false
        default: ''
        type: string

      description:
        description: Approximate description or creative brief (leave empty for automatic generation)
        required: false
        default: ''
        type: string

  schedule:
    - cron: '15 07 * * *'
      timezone: 'Europe/Riga'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate booklet concepts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL }}
          GEMINI_SECOND_FALLBACK_MODEL: ${{ vars.GEMINI_SECOND_FALLBACK_MODEL }}
          GEMINI_MAX_ATTEMPTS: '4'
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IMAGE_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.image_provider || 'mixed' }}
          BOOKLET_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.count || '3' }}
          FORCE_GENERATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_generate && 'true' || 'false' }}
          USE_AI: ${{ github.event_name == 'schedule' && 'true' || (inputs.use_ai && 'true' || 'false') }}
          AI_PROVIDER: ${{ github.event_name == 'schedule' && 'auto' || (!inputs.use_ai && 'local' || inputs.ai_provider) }}
          CHAOS_LEVEL: ${{ github.event_name == 'workflow_dispatch' && inputs.chaos_level || '-1' }}
          MAX_FONTS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_fonts || '20' }}
          BOOKLET_TOPIC: ${{ github.event_name == 'workflow_dispatch' && inputs.topic || '' }}
          BOOKLET_DESCRIPTION: ${{ github.event_name == 'workflow_dispatch' && inputs.description || '' }}
          BOOKLET_RUN_ID: ${{ github.run_id }}
        run: npm run generate

      - name: Commit generated concepts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet; then
            echo "No new concepts to commit."
            exit 0
          fi

          git config user.name "ai-booklet-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/booklets.json
          git commit -m "Add generated booklet concepts"
          git push

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js _site/
          touch _site/.nojekyll
          cp -R data _site/data

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
